# supabase/config.toml — Local development config for Supabase CLI
# Run `supabase start` to spin up a local Supabase stack

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
# Local email testing (catches all outgoing email in dev)
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000", "http://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # set true in production

[auth.sms]
enable_signup = false

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
# redirect_uri is auto-set by Supabase

[functions]
# Edge Functions are in supabase/functions/
# Deploy with: supabase functions deploy <function-name>

[analytics]
enabled = false

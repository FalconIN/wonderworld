<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In — Wonder World Westgate</title>
<link rel="icon" type="image/x-icon" href="favicon.ico" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="styles.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { display: ['Fredoka', 'sans-serif'], body: ['Inter', 'sans-serif'] },
        colors: {
          teal: { DEFAULT: '#0E9F6E', light: '#D1FAE5' },
          indigo: { DEFAULT: '#4F46E5', light: '#EEF2FF' },
          amber: { DEFAULT: '#F59E0B', light: '#FEF3C7' },
        },
      },
    },
  };
</script>
</head>
<body class="bg-offwhite min-h-screen flex flex-col font-body">

<!-- Navbar -->
<nav class="bg-white border-b border-gray-100">
  <div class="max-w-6xl mx-auto px-5 py-3 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2">
      <img src="wwmascot-64.png" alt="Wonder World" class="w-9 h-9 rounded-xl" style="image-rendering:pixelated" />
      <span class="font-display font-bold text-xl text-gray-900">Wonder World <span class="text-indigo-500">Westgate</span></span>
    </a>
    <a href="/" class="text-sm text-gray-500 hover:text-indigo-500 transition-colors">← Back to home</a>
  </div>
</nav>

<!-- Main -->
<div class="flex-1 flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">👋</div>
      <h1 class="font-display font-bold text-3xl text-gray-900 mb-2">Kia ora!</h1>
      <p class="text-gray-500">Sign in or create an account to manage your bookings.</p>
    </div>

    <div class="bg-white rounded-3xl shadow-card p-8">
      <!-- Tabs -->
      <div class="flex bg-gray-100 rounded-xl p-1 mb-6">
        <button id="tabSignup" onclick="switchTab('signup')" class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all bg-white shadow-sm text-gray-900">Create Account</button>
        <button id="tabLogin" onclick="switchTab('login')" class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all text-gray-500">Log In</button>
      </div>

      <!-- Google -->
      <button onclick="signInWithGoogle()" class="w-full flex items-center justify-center gap-3 border-2 border-gray-200 rounded-xl py-3 px-4 font-semibold text-gray-700 hover:bg-gray-50 transition-all mb-4">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>

      <div class="flex items-center gap-3 mb-4">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="text-gray-400 text-xs font-medium">or use email</span>
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>

      <!-- Signup fields -->
      <div id="signupFields" class="space-y-3 mb-4">
        <div class="grid grid-cols-2 gap-3">
          <div><label class="lbl">First Name</label><input class="field" type="text" id="signupFirst" placeholder="Sarah" /></div>
          <div><label class="lbl">Last Name</label><input class="field" type="text" id="signupLast" placeholder="Thompson" /></div>
        </div>
        <div><label class="lbl">Email</label><input class="field" type="email" id="signupEmail" placeholder="hello@example.co.nz" /></div>
        <div><label class="lbl">Password</label><input class="field" type="password" id="signupPassword" placeholder="At least 8 characters" /></div>
      </div>

      <!-- Login fields -->
      <div id="loginFields" class="space-y-3 mb-4" style="display:none">
        <div><label class="lbl">Email</label><input class="field" type="email" id="loginEmail" placeholder="hello@example.co.nz" /></div>
        <div>
          <label class="lbl">Password</label>
          <input class="field" type="password" id="loginPassword" placeholder="Your password" />
          <div class="text-right mt-1"><button onclick="sendReset()" class="text-indigo-500 text-xs hover:underline">Forgot password?</button></div>
        </div>
      </div>

      <div id="authMessage" class="text-sm text-center mb-3 hidden"></div>

      <button onclick="submitAuth()" class="btn-primary w-full py-4" id="authBtn">
        <span id="authBtnText">Create My Account</span>
        <span id="authBtnSpinner" class="hidden">
          <svg class="animate-spin h-5 w-5 mx-auto text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
        </span>
      </button>

      <p class="text-xs text-gray-400 text-center mt-4">By continuing you agree to our <a href="/#rules" class="text-indigo-500">Terms of Entry & Liability Waiver</a>.</p>
    </div>
  </div>
</div>

<script src="supabase.js"></script>
<script>
let currentMode = 'signup';

// Redirect if already logged in
supabaseClient.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = '/';
});

// Handle OAuth redirect
supabaseClient.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) {
    window.location.href = '/';
  }
});

function switchTab(mode) {
  currentMode = mode;
  const isSignup = mode === 'signup';
  document.getElementById('signupFields').style.display = isSignup ? 'block' : 'none';
  document.getElementById('loginFields').style.display = isSignup ? 'none' : 'block';
  document.getElementById('tabSignup').className = isSignup
    ? 'flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all bg-white shadow-sm text-gray-900'
    : 'flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all text-gray-500';
  document.getElementById('tabLogin').className = isSignup
    ? 'flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all text-gray-500'
    : 'flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all bg-white shadow-sm text-gray-900';
  document.getElementById('authBtnText').textContent = isSignup ? 'Create My Account' : 'Log In';
  document.getElementById('authMessage').classList.add('hidden');
}

function showMsg(msg, isError = false) {
  const el = document.getElementById('authMessage');
  el.textContent = msg;
  el.className = `text-sm text-center mb-3 ${isError ? 'text-red-500' : 'text-teal-600'}`;
  el.classList.remove('hidden');
}

function setLoading(on) {
  document.getElementById('authBtn').disabled = on;
  document.getElementById('authBtnText').classList.toggle('hidden', on);
  document.getElementById('authBtnSpinner').classList.toggle('hidden', !on);
}

async function submitAuth() {
  setLoading(true);
  try {
    if (currentMode === 'signup') {
      const first = document.getElementById('signupFirst').value.trim();
      const last  = document.getElementById('signupLast').value.trim();
      const email = document.getElementById('signupEmail').value.trim().toLowerCase();
      const pass  = document.getElementById('signupPassword').value;
      if (!first || !last || !email || !pass) throw new Error('Please fill in all fields.');
      if (pass.length < 8) throw new Error('Password must be at least 8 characters.');
      const { data, error } = await supabaseClient.auth.signUp({
        email, password: pass,
        options: { data: { first_name: first, last_name: last }, emailRedirectTo: window.location.origin + '/' }
      });
      if (error) throw new Error(error.message);
      if (data.user && !data.session) {
        showMsg('✅ Check your inbox! Click the verification link then log in.');
        switchTab('login');
      } else {
        window.location.href = '/';
      }
    } else {
      const email = document.getElementById('loginEmail').value.trim().toLowerCase();
      const pass  = document.getElementById('loginPassword').value;
      if (!email || !pass) throw new Error('Please enter your email and password.');
      const { error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
      if (error) throw new Error(error.message === 'Invalid login credentials' ? 'Incorrect email or password.' : error.message);
      window.location.href = '/';
    }
  } catch (err) {
    showMsg(err.message, true);
  } finally {
    setLoading(false);
  }
}

async function signInWithGoogle() {
  const { error } = await supabaseClient.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/' }
  });
  if (error) showMsg('Google sign-in failed: ' + error.message, true);
}

async function sendReset() {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  if (!email) { showMsg('Enter your email first.', true); return; }
  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/?reset=1'
  });
  if (error) showMsg('Error: ' + error.message, true);
  else showMsg('✅ Password reset email sent!');
}

// Allow Enter key to submit
document.addEventListener('keydown', e => { if (e.key === 'Enter') submitAuth(); });
</script>
</body>
</html>

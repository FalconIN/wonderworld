server {
    listen 80;
    listen [::]:80;
    server_name wonderworldwestgate.co.nz www.wonderworldwestgate.co.nz;

    # Redirect HTTP to HTTPS (uncomment after running certbot)
    # return 301 https://$host$request_uri;

    root /home/claudeuser/wonderworld;
    index index.html;

    # Proxy all /api/* requests to the Express server
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Larger body for webhook / file uploads
        client_max_body_size 10M;
    }

    # Serve static files directly
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 256;
}

